name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    - name: Run tests
      run: cargo test --verbose
    - name: Run clippy
      run: cargo clippy -- -D warnings
    - name: Check formatting
      run: cargo fmt -- --check

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - armv7-unknown-linux-gnueabihf
    steps:
    - uses: actions/checkout@v4
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}
    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    - name: Install cross-compilation tools
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu gcc-arm-linux-gnueabihf g++-aarch64-linux-gnu g++-arm-linux-gnueabihf nasm
        # Set up environment variables for cross-compilation
        echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
        echo "CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER=arm-linux-gnueabihf-gcc" >> $GITHUB_ENV
        echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
        echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++" >> $GITHUB_ENV
        echo "CC_armv7_unknown_linux_gnueabihf=arm-linux-gnueabihf-gcc" >> $GITHUB_ENV
        echo "CXX_armv7_unknown_linux_gnueabihf=arm-linux-gnueabihf-g++" >> $GITHUB_ENV
    - name: Build
      run: cargo build --release --target ${{ matrix.target }}
    - name: Upload binary
      uses: actions/upload-artifact@v4
      with:
        name: wdic-gateway-${{ matrix.target }}
        path: target/${{ matrix.target }}/release/wdic-gateway

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    strategy:
      matrix:
        target:
          - x86_64-pc-windows-msvc
          - i686-pc-windows-msvc
    steps:
    - uses: actions/checkout@v4
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}
    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Install NASM
      run: choco install nasm   
    
    - name: Fetch crates
      run: cargo fetch --target ${{ matrix.target }}

    - name: Patch BoringSSL processor name (i686)
      if: matrix.target == 'i686-pc-windows-msvc'
      run: |
        # Get cargo home directory - use environment variable or default location
        $cargoHome = if ($env:CARGO_HOME) { $env:CARGO_HOME } else { "$env:USERPROFILE\.cargo" }
        $cmakeFile = "$cargoHome\registry\src\index.crates.io-*\quiche-0.24.6\deps\boringssl\CMakeLists.txt"
        
        # Check if the file exists before attempting to patch it
        $cmakeFiles = Get-ChildItem -Path $cmakeFile -ErrorAction SilentlyContinue
        if ($cmakeFiles) {
          Write-Host "Found BoringSSL CMakeLists.txt file(s), applying X86 -> x86 patch..."
          foreach ($file in $cmakeFiles) {
            Write-Host "Patching: $($file.FullName)"
            (Get-Content $file.FullName) -replace 'X86', 'x86' | Set-Content $file.FullName
          }
        } else {
          Write-Host "Warning: BoringSSL CMakeLists.txt file not found at $cmakeFile"
          Write-Host "This may not be an error if the file structure has changed."
        }
 
    - name: Build
      env:
        # Set proper processor architecture for CMake on Windows i686
        CMAKE_GENERATOR: Visual Studio 17 2022
        CMAKE_SYSTEM_PROCESSOR: ${{ matrix.target == 'i686-pc-windows-msvc' && 'x86' || '' }}
        # BoringSSL CMake workaround for i686 Windows  
        CMAKE_GENERATOR_PLATFORM: ${{ matrix.target == 'i686-pc-windows-msvc' && 'Win32' || '' }}
        CMAKE_GENERATOR_TOOLSET: ${{ matrix.target == 'i686-pc-windows-msvc' && 'host=x86' || '' }}
      run: cargo build --release --target ${{ matrix.target }}
    - name: Upload binary
      uses: actions/upload-artifact@v4
      with:
        name: wdic-gateway-${{ matrix.target }}
        path: target/${{ matrix.target }}/release/wdic-gateway.exe

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    strategy:
      matrix:
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin
    steps:
    - uses: actions/checkout@v4
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}
    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    - name: Build
      run: cargo build --release --target ${{ matrix.target }}
    - name: Upload binary
      uses: actions/upload-artifact@v4
      with:
        name: wdic-gateway-${{ matrix.target }}
        path: target/${{ matrix.target }}/release/wdic-gateway